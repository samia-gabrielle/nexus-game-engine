<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS - A Jornada Completa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body { background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 100%); color: #e8e8e8; font-family: Arial, sans-serif; line-height: 1.6; padding: 20px; }
    .container { max-width: 1400px; margin: 0 auto; background: rgba(15, 15, 35, 0.95); border: 2px solid #00d4ff; border-radius: 8px; padding: 30px; box-shadow: 0 0 30px rgba(0, 212, 255, 0.3); }
    h1 { text-align: center; color: #00d4ff; margin-bottom: 20px; font-size: 3em; text-shadow: 0 0 20px #00d4ff; }
    .header { display: flex; justify-content: space-between; margin-bottom: 20px; color: #00d4ff; font-size: 0.9em; }
    .main-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
    .scene-container { background: rgba(50, 50, 80, 0.5); border-left: 4px solid #a066ff; padding: 20px; border-radius: 4px; }
    .scene-container h2 { color: #a066ff; margin-bottom: 15px; font-size: 1.8em; }
    .scene-image { width: 100%; height: 350px; border: 2px solid #a066ff; margin: 15px 0; border-radius: 4px; object-fit: contain; background: rgba(0,0,0,0.3); }
    .narrative { color: #d0d0d0; margin: 15px 0; line-height: 1.8; font-size: 1.05em; }
    .choices { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
    button { padding: 12px 20px; background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(160,102,255,0.1)); border: 2px solid #00d4ff; color: #e8e8e8; border-radius: 4px; cursor: pointer; font-size: 1em; font-weight: bold; transition: all 0.3s; }
    button:hover { background: linear-gradient(135deg, rgba(0,212,255,0.3), rgba(160,102,255,0.3)); box-shadow: 0 0 15px rgba(0,212,255,0.5); transform: translateX(5px); }

    .sidebar { display: flex; flex-direction: column; gap: 15px; }
    .panel { background: rgba(50, 50, 80, 0.5); border: 1px solid #a066ff; border-radius: 4px; padding: 15px; }
    .panel h3 { color: #00d4ff; margin-bottom: 10px; font-size: 1.1em; cursor: pointer; user-select: none; }
    .panel h3:hover { text-shadow: 0 0 10px #a066ff; }
    .panel-item { background: rgba(160, 102, 255, 0.2); border: 1px solid #a066ff; padding: 8px 12px; margin: 5px 0; border-radius: 3px; cursor: pointer; transition: all 0.3s; font-size: 0.9em; }
    .panel-item:hover { background: rgba(160, 102, 255, 0.4); box-shadow: 0 0 10px rgba(160, 102, 255, 0.3); }

    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
    .modal.show { display: flex; }
    .modal-content { background: #1a1a2e; border: 2px solid #a066ff; border-radius: 8px; padding: 40px; max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 0 40px rgba(160, 102, 255, 0.7); }
    .modal-content h2 { color: #a066ff; margin-top: 0; margin-bottom: 25px; font-size: 2em; }
    .close { float: right; font-size: 28px; font-weight: bold; color: #a066ff; cursor: pointer; user-select: none; }
    .close:hover { color: #00d4ff; }

    .entry-box { background: rgba(50, 50, 80, 0.7); border-left: 4px solid #a066ff; padding: 20px; margin: 15px 0; border-radius: 4px; }
    .entry-box h4 { color: #00d4ff; margin-bottom: 12px; font-size: 1.2em; }
    .entry-box p { color: #d0d0d0; line-height: 1.8; margin: 8px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>NEXUS</h1>
    <div class="header">
      <span>⏱️ Playtime: <span id="playtime">0:00</span></span>
      <span>📖 Cenas: <span id="scenesCount">0</span>/100+</span>
    </div>

    <div class="main-layout">
      <div>
        <div class="scene-container">
          <h2 id="sceneTitle">Carregando...</h2>
          <img id="sceneImage" class="scene-image" alt="Scene">
          <div id="narrative" class="narrative"></div>
          <div id="choices" class="choices"></div>
        </div>
      </div>

      <div class="sidebar">
        <div class="panel">
          <h3 onclick="openRelsModal()">👥 Relacionamentos</h3>
          <div id="relationships"></div>
        </div>
        <div class="panel">
          <h3>📝 Caderno</h3>
          <div id="notebook"></div>
        </div>
        <div class="panel">
          <h3>🔷 Ecos (<span id="echoCount">0</span>)</h3>
          <div id="echoes"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL CADERNO -->
  <div id="cadernoModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeCaderno()">&times;</span>
      <h2 id="cadernoTitle">📝</h2>
      <div id="cadernoContent"></div>
    </div>
  </div>

  <!-- MODAL ECO -->
  <div id="ecoModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeEco()">&times;</span>
      <h2 id="ecoTitle">🔷</h2>
      <div id="ecoContent"></div>
    </div>
  </div>

  <!-- MODAL RELACIONAMENTOS -->
  <div id="relsModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeRels()">&times;</span>
      <h2>👥 Relacionamentos</h2>
      <div id="relsContent"></div>
    </div>
  </div>

  <!-- ÁUDIO: Sons -->
  <audio id="clickSound" preload="auto">
    <source src="game-engine/public/audio/sfx/click.mp3" type="audio/mpeg">
  </audio>
  <audio id="transitionSound" preload="auto">
    <source src="game-engine/public/audio/sfx/transition.mp3" type="audio/mpeg">
  </audio>
  <audio id="echoSound" preload="auto">
    <source src="game-engine/public/audio/sfx/success.mp3" type="audio/mpeg">
  </audio>

  <script>

        opcoes: [

          { texto: 'Tentar lembrar o que aconteceu', prox: 'cena1b', caderno: 'Memória Obscura', descricao: 'Fragmentos retornam: vozes gritando em desespero, portas de metal se fechando, o cheiro de queimado. Algo terrível aconteceu. Você estava com alguém? A memória é como um espelho quebrado - imagens que não se conectam.' }

          { texto: 'Que lugar é este?', prox: 'cena2b', ivo: 5, caderno: 'O Lugar Impossível', descricao: 'Ivo aponta para os cristais: "NEXUS. Uma cidade subterrânea de mais de 200 anos. Os cristais alimentam tudo - luz, ar, energia. Somos totalmente autossuficientes. Ninguém acima sabe que existimos."' }

          { texto: 'Levantar imediatamente', prox: 'cena2d', sera: -10, caderno: 'Ação Impulsiva', descricao: 'Você se levanta abruptamente, ainda tonto. A mulher se assusta, sua mão vai para a arma. "Calma! Você está em NEXUS! É um refúgio!" Mas sua expressão diz que está pronta para defender-se. Você pode ter cometido um erro.' }

        opcoes: [
          { texto: 'Outros tentaram?', prox: 'cena4i', sera: 25, caderno: 'Os Primeiros', descricao: 'Será assente, com tristeza: "Três antes de você. Cientistas voluntários que acreditavam que o sacrifício poderia salvar NEXUS. Eles chegaram aqui, mas seus corpos não conseguiram se estabilizar. Definharam em dias. Você... você é diferente. Seu corpo aceitou a mudança. Como?"' },
          { texto: 'Você acredita que posso salvar NEXUS?', prox: 'cena4j', sera: 40, caderno: 'Fé de Será', descricao: '"Acredito. Porque você está vivo quando outros não estão. Porque há algo especial em você - posso sentir. Você é a Ponte que o Códice previu. Não é coincidência que chegou agora, quando tudo está se desintegrando."' }
        ],
        echo: 'Será: A Médica Esperançosa'
      },
      'cena3f': {
        titulo: 'Confronto Armado',
        imagem: 'game-engine/public/images/character_02_sera_commanding.png',
        texto: 'Você abre os olhos como um assustado. Será pula para trás, sua arma já em mãos. "Não faça movimentos bruscos!" ela grita, profissional mas preocupada. "Você não sabe seu próprio estado. Seu corpo passou por um trauma além da compreensão."',
        opcoes: [
          { texto: 'Abaixar-se e acalmar', prox: 'cena4k', sera: 20, caderno: 'Desescalação', descricao: 'Você se abaixa lentamente, respirando profundamente. Será vê que você não é uma ameaça e baixa a arma. "Bom. Ivo estava certo. Você tem bom julgamento para alguém que acabou de despertar."' },
          { texto: 'Perguntar por água', prox: 'cena4l', sera: 15, caderno: 'Necessidade Humana', descricao: 'Você sussurra um pedido por água. Será relaxa imediatamente. Humanidade é desarmante. Ela oferece uma taça e sua postura muda de hostil para cuidadosa. Um primeiro passo para confiança.'  }
        ],
        echo: 'Será: Guardiã Desconfiada'
      },
      'cena3g': {
        titulo: 'Recuperação Sob Supervisão',
        imagem: 'game-engine/public/images/character_02_sera_commanding.png',
        texto: 'Você deita-se como instruído. Será traz uma câmara de recuperação - uma máquina que brilha levemente com o mesmo tom dos cristais. "Sente-se melhor em uma hora," ela promete. "O corpo está sob trauma multidimensional. A câmara ajuda a sincronizar suas moléculas com esta realidade." Enquanto você repousa, Será compartilha histórias. De como veio para NEXUS, de como perdeu sua família no colapso, de como encontrou propósito em curar os feridos aqui.',
        opcoes: [
          { texto: 'Conhecer a verdadeira Será', prox: 'cena4m', sera: 35, caderno: 'Vulnerabilidade Compartilhada', descricao: '"Minha filha tinha 8 anos," Será confessa. "Quando o colapso começou, ela estava na superfície. Eu estava aqui. Não consegui chegar a tempo. Todos nós perdemos alguém. NEXUS é feita de luto compartilhado. Mas é também nossa última esperança."' },
          { texto: 'Oferecer companhia silenciosa', prox: 'cena4n', sera: 30, caderno: 'Presença Reconfortante', descricao: 'Você pega na mão dela. Nenhuma palavra é necessária. O contato humano é suficiente. Será aperta sua mão de volta, grata. Há conexões que transcendem palavras.' }
        ],
        echo: 'Será: A Mulher do Luto'
      },
      'cena3h': {
        titulo: 'Teste Físico e Mental',
        imagem: 'game-engine/public/images/character_02_sera_commanding.png',
        texto: 'Você tenta caminhar. Seus pés encontram o chão mas as pernas não obedecem totalmente. Será te apoia. "Sua mente está mais forte que seu corpo agora," ela observa profissionalmente. "Isso é anormal. Normalmente é o oposto - o corpo se recupera mais rápido que a psique. Você é realmente diferente." Ela te ajuda a uma cadeira. "Deixe-me informar Ivo que você acordou. Ele tem estado esperando há horas."',
        opcoes: [
          { texto: 'Permitir que ela o informe', prox: 'cena4o', sera: 15, ivo: 10, caderno: 'Comunicação', descricao: 'Você concorda. Será sai brevemente. Você ouve sua voz pelo comunicador: "Ele acordou. Sim, é aquele do Códice. Sim, estou segura disso. Estou mandando-o para você agora." Há esperança em sua voz.' },
          { texto: 'Fazer perguntas a ela primeiro', prox: 'cena4p', sera: 25, caderno: 'Aprendizado', descricao: 'Você pede que fale mais sobre NEXUS. Será senta-se e conta histórias de antes do colapso - quando havia 2000 pessoas aqui, quando havia esperança. "Você está vendo NEXUS em seu crepúsculo. Posso mostrar fotos de como era. De como poderia ser novamente."' }
        ],
        echo: 'Teste de Vontade'
      },
      'fim_bom': {
        titulo: 'O Novo Começo',
        imagem: 'game-engine/public/images/scene-2050.png',
        texto: 'Você agora é parte de NEXUS. Você compreende sua natureza - um Ponte entre realidades, um ponto focal de consciência multidimensional. O caminho à frente é incerto. O Diretor ainda o vê como ameaça. Alguns cidadãos o veem como salvador. Você não é nem um nem outro - apenas uma pessoa tentando compreender um mundo que não compreende nem a si mesmo. Mas você tem Ivo, que oferece sabedoria. Tem Será, que oferece cuidado. Tem Thomas, que oferece esperança científica. E tem NEXUS - uma cidade agonizante que talvez, apenas talvez, possa ser salva. A verdadeira jornada está apenas começando.',
        opcoes: [
          { texto: 'Jogar Novamente', prox: 'inicio' }
        ]
      },
      'final_bad': {
        titulo: 'O Fim de NEXUS',
        imagem: 'game-engine/public/images/character_06_director_dilemma.png',
        texto: 'Suas escolhas levaram NEXUS ao colapso final. Os cristais explodiram. A câmara dimensional se rasgou. Milhões de anos de história foram varridos em segundos. Você se vê preso entre realidades, existindo em nenhuma delas. É agonia e vazio simultaneamente. O último pensamento que passa por sua mente é que você falhou não apenas NEXUS, mas a todos em todas as dimensões. O jogo termina não em morte, mas em não-existência.',
        opcoes: [
          { texto: 'Jogar Novamente', prox: 'inicio' }
        ]
      }
    };

    let gameState = {
      cenaAtual: 'inicio',
      relacionamentos: { ivo: 0, sera: 0, thomas: 0, reva: 0, director: 0, monks: 0 },
      ecos: [],
      caderno: [],
      cenas: 0,
      tempo: 0
    };

    function playClick() {
      try {
        const audio = document.getElementById('clickSound');
        audio.currentTime = 0;
        audio.play().catch(() => {});
      } catch (e) {}
    }

    function playTransition() {
      try {
        const audio = document.getElementById('transitionSound');
        audio.currentTime = 0;
        audio.play().catch(() => {});
      } catch (e) {}
    }

    function playEcho() {
      try {
        const audio = document.getElementById('echoSound');
        audio.currentTime = 0;
        audio.play().catch(() => {});
      } catch (e) {}
    }

    function render(id) {
      if (!gameData[id]) return;
      const cena = gameData[id];

      if (cena.init) {
        gameState.relacionamentos = { ivo: 0, sera: 0, thomas: 0, reva: 0, director: 0, monks: 0 };
        gameState.ecos = [];
        gameState.caderno = [];
        gameState.cenas = 0;
      }

      document.getElementById('sceneTitle').textContent = cena.titulo;
      document.getElementById('sceneImage').src = cena.imagem;
      document.getElementById('narrative').textContent = cena.texto;

      let html = '';
      cena.opcoes.forEach(opt => {
        html += '<button onclick="ir(\'' + opt.prox + '\')">' + opt.texto + '</button>';
      });
      document.getElementById('choices').innerHTML = html;

      cena.opcoes.forEach(opt => {
        if (opt.ivo) gameState.relacionamentos.ivo += opt.ivo;
        if (opt.sera) gameState.relacionamentos.sera += opt.sera;
        if (opt.thomas) gameState.relacionamentos.thomas += opt.thomas;
        if (opt.director) gameState.relacionamentos.director += opt.director;
        if (opt.caderno && !gameState.caderno.find(c => c.titulo === opt.caderno)) {
          gameState.caderno.push({ titulo: opt.caderno, descricao: opt.descricao || 'Entrada do caderno.' });
        }
      });

      if (cena.echo && !gameState.ecos.includes(cena.echo)) {
        gameState.ecos.push(cena.echo);
      }

      gameState.cenas++;

      let relsHtml = '';
      for (const [nome, valor] of Object.entries(gameState.relacionamentos)) {
        let cor = valor < -50 ? '#ff3333' : valor < 0 ? '#ff9800' : valor < 50 ? '#2196F3' : '#4CAF50';
        relsHtml += '<div class="panel-item" onclick="openRelsModal()" style="color:' + cor + ';">' + nome + ': ' + (valor > 0 ? '+' : '') + valor + '</div>';
      }
      document.getElementById('relationships').innerHTML = relsHtml;

      let notebookHtml = gameState.caderno.map((n, idx) => '<div class="panel-item" onclick="openCaderno(' + idx + ')" style="cursor:pointer;">📝 ' + n.titulo + '</div>').join('');
      document.getElementById('notebook').innerHTML = notebookHtml || '<div style="color:#999;">Nenhuma entrada</div>';

      let echosHtml = gameState.ecos.map((e, idx) => '<div class="panel-item" onclick="openEco(' + idx + ')" style="cursor:pointer;">🔷 ' + e + '</div>').join('');
      document.getElementById('echoes').innerHTML = echosHtml || '<div style="color:#999;">Nenhum eco</div>';
      document.getElementById('echoCount').textContent = gameState.ecos.length;

      document.getElementById('scenesCount').textContent = gameState.cenas;
    }

    function ir(id) {
      playTransition();
      gameState.cenaAtual = id;
      render(id);
      window.scrollTo(0, 0);
    }

    function openCaderno(idx) {
      playClick();
      const item = gameState.caderno[idx];
      document.getElementById('cadernoTitle').textContent = '📝 ' + item.titulo;
      document.getElementById('cadernoContent').innerHTML = '<div class="entry-box"><h4>' + item.titulo + '</h4><p>' + item.descricao + '</p></div>';
      document.getElementById('cadernoModal').classList.add('show');
    }

    function closeCaderno() {
      document.getElementById('cadernoModal').classList.remove('show');
    }

    function openEco(idx) {
      playEcho();
      const item = gameState.ecos[idx];
      document.getElementById('ecoTitle').textContent = '🔷 ' + item;
      document.getElementById('ecoContent').innerHTML = '<div class="entry-box"><h4>🔷 ' + item + '</h4><p>Um eco que marca profundamente sua jornada em NEXUS. Esse momento mudará você para sempre.</p></div>';
      document.getElementById('ecoModal').classList.add('show');
    }

    function closeEco() {
      document.getElementById('ecoModal').classList.remove('show');
    }

    function openRelsModal() {
      playClick();
      let html = '';
      for (const [nome, valor] of Object.entries(gameState.relacionamentos)) {
        let cor = valor < -50 ? '#ff3333' : valor < 0 ? '#ff9800' : valor < 50 ? '#2196F3' : '#4CAF50';
        html += '<div class="entry-box" style="border-left-color:' + cor + '"><h4 style="color:' + cor + '">' + nome.toUpperCase() + '</h4><p style="color:' + cor + '">Relacionamento: ' + (valor > 0 ? '+' : '') + valor + '/100</p></div>';
      }
      document.getElementById('relsContent').innerHTML = html;
      document.getElementById('relsModal').classList.add('show');
    }

    function closeRels() {
      document.getElementById('relsModal').classList.remove('show');
    }

    window.onclick = function(e) {
      if (e.target.id === 'cadernoModal') closeCaderno();
      if (e.target.id === 'ecoModal') closeEco();
      if (e.target.id === 'relsModal') closeRels();
    }

    setInterval(() => {
      gameState.tempo++;
      let m = Math.floor(gameState.tempo / 60);
      let s = (gameState.tempo % 60).toString().padStart(2, '0');
      document.getElementById('playtime').textContent = m + ':' + s;
    }, 1000);

    render('inicio');
  </script>
</body>
</html>
