<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>NEXUS</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0e27;color:#e8e8e8;font-family:Arial;padding:20px}.container{max-width:1400px;margin:0 auto;background:rgba(15,15,35,0.95);border:2px solid #00d4ff;border-radius:8px;padding:30px}h1{text-align:center;color:#00d4ff;margin-bottom:20px;font-size:3em}.header{display:flex;justify-content:space-between;margin-bottom:20px;color:#00d4ff}.main{display:grid;grid-template-columns:2fr 1fr;gap:20px}.scene{background:rgba(50,50,80,0.5);border-left:4px solid #a066ff;padding:20px}.scene h2{color:#a066ff;margin-bottom:15px}.scene-img{width:100%;height:350px;border:2px solid #a066ff;margin:15px 0;object-fit:contain;background:rgba(0,0,0,0.3)}.narrative{color:#d0d0d0;margin:15px 0}.choices{display:flex;flex-direction:column;gap:10px;margin-top:20px}button{padding:12px 20px;background:rgba(0,212,255,0.1);border:2px solid #00d4ff;color:#e8e8e8;cursor:pointer;font-weight:bold}.sidebar{display:flex;flex-direction:column;gap:15px}.panel{background:rgba(50,50,80,0.5);border:1px solid #a066ff;padding:15px}.panel h3{color:#00d4ff;margin-bottom:10px;cursor:pointer}.item{background:rgba(160,102,255,0.2);border:1px solid #a066ff;padding:8px;margin:5px 0;cursor:pointer;font-size:0.9em}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:1000;justify-content:center;align-items:center}.modal.show{display:flex}.modal-content{background:#1a1a2e;border:2px solid #a066ff;padding:40px;max-width:900px;width:100%;max-height:90vh;overflow-y:auto}.close{float:right;font-size:28px;color:#a066ff;cursor:pointer}.box{background:rgba(50,50,80,0.7);border-left:4px solid #a066ff;padding:20px;margin:15px 0}.box h4{color:#00d4ff;margin-bottom:12px}.box p{color:#d0d0d0;margin:8px 0;line-height:1.8}</style></head><body><div class="container"><h1>NEXUS</h1><div class="header"><span>⏱️ Playtime: <span id="time">0:00</span></span><span>📖 Cenas: <span id="count">0</span></span></div><div class="main"><div><div class="scene"><h2 id="title">Despertar em 2150</h2><img id="img" class="scene-img" alt="Cena"><div id="text" class="narrative"></div><div id="btns" class="choices"></div></div></div><div class="sidebar"><div class="panel"><h3 onclick="openRels()">👥 Relacionamentos</h3><div id="rels"></div></div><div class="panel"><h3>📝 Caderno</h3><div id="note"></div></div><div class="panel"><h3>🔷 Ecos (<span id="ecount">0</span>)</h3><div id="echo"></div></div></div></div></div><div id="noteModal" class="modal" onclick="if(event.target===this)closeNote()"><div class="modal-content"><span class="close" onclick="closeNote()">&times;</span><h2>📝 Caderno</h2><div id="noteExp"></div></div></div><div id="echoModal" class="modal" onclick="if(event.target===this)closeEcho()"><div class="modal-content"><span class="close" onclick="closeEcho()">&times;</span><h2>🔷 Ecos</h2><div id="echoExp"></div></div></div><div id="relModal" class="modal" onclick="if(event.target===this)closeRels()"><div class="modal-content"><span class="close" onclick="closeRels()">&times;</span><h2>👥 Relacionamentos</h2><div id="relExp"></div></div></div><script>const DESC={
'Primeiro Despertar':'Seu primeiro momento de consciência em NEXUS. Os olhos se abrem para cristais gigantes brilhando com luz própria. Você sente o peso da mudança dimensional em seu corpo. A câmara se estende em todas as direções - a escala é impossível de calcular. Você é novo aqui, mas algo dentro reconhece este lugar.',
'O Guardião':'Ivo, grisalho, com olhos que parecem conter décadas de sabedoria acumulada. Guardião de NEXUS há 30 anos. Há autoridade em sua voz, mas também cansaço - o peso de três décadas observando uma civilização morrer lentamente.',
'Revelação do Lugar':'NEXUS. Cidade subterrânea, 200+ anos, construída em 1847. Cientistas acreditavam que a superfície estava condenada. Vocês vivem entre as dimensões, protegidos por barreiras que falham. Os cristais alimentam tudo - luz, ar, energia.',
'Estratégia Silenciosa':'Você mantém os olhos fechados enquanto uma mulher trabalha ao seu lado. Uniforme militar, cabelos pretos cortados curto com precisão. Sua voz profissional: "Padrões neurais estabilizando. Injetando estabilizador dimensional."',
'Ação Impulsiva':'Você se levanta abruptamente, ainda tonto pelo trauma dimensional. O quarto gira. A mulher pula para trás. Sua mão vai para a arma. "Calma! Você está em NEXUS!" Mas você pode ver o cálculo em seus olhos.',
'O Propósito Oculto':'Ivo leva você a uma biblioteca antiga. "Você existe em múltiplas dimensões simultaneamente. Em outras realidades, outras versões de você fizeram escolhas diferentes. Aqui você é um ponto de convergência - uma PONTE entre mundos."',
'A Tecnologia Multidimensional':'Ivo senta pesadamente. "Em 1847, fundadores descobriram acidentalmente que o universo não é singular. Infinitas realidades se ramificam a cada decisão. NEXUS foi construída em lacuna entre realidades."',
'O Declínio Inevitável':'A Câmara Cristalina. Cristais monumentais, alguns com centenas de metros. Alguns brilham vibrantes. Mas muitos estão acinzentados. "Grande Colapso 2150," diz Ivo. "Barreiras dimensionais desaparecendo."',
'A Possibilidade de Salvação':'Ivo observa com intensidade. "Se você é realmente PONTE, sua consciência pode estar sincronizada com cristais de forma única. Você poderia servir como ponto de âncora. Mas processo é desconhecido. Perigoso."',
'Será: A Médica Compassiva':'Você abre os olhos lentamente. Será sorri genuinamente. "Bem-vindo de volta. Sou Será, médica-chefe de NEXUS. Você passou por transição dimensional extrema. Padrões neurais mostram atividade que nunca vi."',
'Revelação Abrupta':'Você abre os olhos subitamente. Será pula assustada. Sua mão vai para arma. "Não faça movimentos bruscos! Você ainda está se estabilizando. Trauma além da compreensão humana."',
'Confiança e Repouso':'Você reconhece autoridade genuína em sua voz. Voz de alguém que salvou muitas vidas. Você deita voluntariamente. Será relaxa, mão saindo da arma. "Bom. Você tem bom julgamento."',
'Teste de Força Dimensional':'Você tenta caminhar. Pés encontram chão, mas pernas não obedecem completamente. Atraso entre intenção e execução. Você consegue poucos passos antes de cair. Será pega você. "Sua mente extraordinariamente forte."',
'O Experimento Unificação':'Ivo puxa arquivo antigo. "Em 2150, havia projeto ambicioso demais chamado Unificação em múltiplas dimensões. Objetivo era criar realidade singular. Universo sem ramificações, sem paradoxos. Experimento falhou cataclismicamente."',
'Paradoxo Multidimensional':'Ivo observa cuidadosamente. "Em algumas dimensões, você era cientista-chefe. Em outras, maior opositor. Em outras ainda, nem existiu. Você pode ser simultaneamente responsável e inocente."',
'Thomas: O Jovem Esperança':'Thomas pega livro literalmente entalhado em rocha. "Fundadores deixaram profecias. E também previram PONTE - pessoa cuja consciência se estenda através realidades."',
'A Fé do Jovem Cientista':'Thomas sorri genuinamente. "Porque você chegou. Códice disse que chegaria quando cristais começassem falhar. Aqui você está, vivo. Ainda há esperança para NEXUS."',
'O Toque da PONTE':'Ivo observa enquanto examina cristais. "Se você é realmente PONTE, sua consciência pode estar sincronizada com eles. Você poderia alimentá-los com sua própria energia. Seria como ser bateria viva."',
'O Tempo se Esgota Rapidamente':'Ivo respira fundo. "Não é exatamente anos. Deterioração está acelerando exponencialmente. Talvez meses. Talvez semanas. Quando último cristal apagar, NEXUS colapsa."',
'A Necessidade de Apoio':'Ivo nega com cabeça. "Esconder não funcionará. Você precisa ganhar apoio real. Conquistar corações de NEXUS. Mostrar que não é ameaça, mas solução."',
'O Antagonista Revelado':'Ivo senta pesadamente. "Diretor perdeu família inteira no Colapso 2150. Dor o transformou. Agora acredita que única forma proteger NEXUS é controle absoluto."',
'Os Primeiros Voluntários':'Será senta-se. "Três pessoas antes de você. Voluntários que acreditavam sacrifício salvaria NEXUS. Definharam gradualmente. Você realmente diferente."',
'A Fé de Será':'Será olha diretamente, olhos azuis cheios de esperança. "Acredito. Você está aqui vivo, intacto, depois que outros morreram. Padrões cerebrais impossíveis. Você é PONTE que Códice previa."',
'Desescalação Estratégica':'Você lentamente se abaixa, mantendo mãos visíveis. Mantém contato visual mostrando compreensão. Será vê resposta calculada. Mão sai lentamente da arma. "Bom. Você tem inteligência tática."',
'Necessidade Humana':'Você sussurra pedido simples, humano, vulnerável: água. Será relaxa completamente. Humanidade é mais desarmante que força. Postura muda de hostil para cuidadosa. Primeiro passo real em direção confiança.',
'Vulnerabilidade Compartilhada':'Será confessa, voz tremendo. "Minha filha tinha 8 anos. Nome era Mara. Quando colapso começou, ela estava superfície com marido. Perdi ambos em horas. Aqui em NEXUS, todos perdemos alguém."',
'Presença Reconfortante':'Você pega na mão dela. Nenhuma palavra necessária. Contato físico diz tudo. Será aperta sua mão, profundamente grata. Há conexões que transcendem linguagem, surgem quando alguém compreende peso que você carrega.'
};const CENAS={'inicio':{t:'Despertar em 2150',i:'scene-2150.png',txt:'A escuridão envolve tudo. Você acorda com dor pulsante. Máquinas zumbindo. Estruturas metálicas. Onde está? Memória nevoenta.',o:[{t:'Abrir os olhos',p:'s1a',ivo:10,n:'Primeiro Despertar'},{t:'Lembrar',p:'s1b',n:'Memória Obscura'}],init:1,e:'Despertar em 2150'},'s1a':{t:'Cristais',i:'scene-archive.png',txt:'Câmara gigante. Cristais brilhando. Homem se aproxima.',o:[{t:'Quem é?',p:'s2a',ivo:15,n:'O Guardião'},{t:'Onde?',p:'s2b',ivo:5,n:'Revelação do Lugar'}],e:'A Câmara dos Cristais'},'s1b':{t:'Memória',i:'character_06_director_dilemma.png',txt:'Cidade acima. Pânico. Explosão. Escuridão.',o:[{t:'Observar',p:'s2c',n:'Estratégia Silenciosa'},{t:'Levantar',p:'s2d',sera:-10,n:'Ação Impulsiva'}],e:'O Colapso de 2150'},'s2a':{t:'Ivo',i:'character_01_ivo_archive.png',txt:'"Guardião de NEXUS. Você foi trazido porque NEXUS morre."',o:[{t:'Por quê?',p:'s3a',ivo:30,n:'O Propósito Oculto'},{t:'Multidimensionalidade?',p:'s3b',ivo:25,n:'A Tecnologia Multidimensional'}],e:'Ivo: O Guardião'},'s2b':{t:'Cidade',i:'scene-deepsea.png',txt:'"NEXUS. 200 anos. Cristais falhando."',o:[{t:'Cristais?',p:'s3c',ivo:20,n:'O Declínio Inevitável'},{t:'Salvar?',p:'s3d',ivo:15,n:'A Possibilidade de Salvação'}],e:'NEXUS: A Cidade'},'s2c':{t:'Observação',i:'character_02_sera_commanding.png',txt:'Mulher entra. Uniforme. "Estabilizador neural."',o:[{t:'Acordar',p:'s3e',sera:10,n:'Será: A Médica Compassiva'},{t:'Dramaticamente',p:'s3f',sera:-10,n:'Revelação Abrupta'}],e:'Será'},'s2d':{t:'Confronto',i:'character_02_sera_commanding.png',txt:'Você levanta. Ela recua. Arma.',o:[{t:'Obedecer',p:'s3g',sera:25,n:'Confiança e Repouso'},{t:'Testar',p:'s3h',sera:5,n:'Teste de Força Dimensional'}],e:'Primeiro Confronto'},'s3a':{t:'Propósito',i:'character_07_monks_council.png',txt:'Ivo: "Você existe em múltiplas dimensões."',o:[{t:'Quem?',p:'s4a',ivo:40,n:'O Experimento Unificação'},{t:'Responsável?',p:'s4b',ivo:20,n:'Paradoxo Multidimensional'}],e:'O Grande Colapso'},'s3b':{t:'Tecnologia',i:'character_03_thomas_dimensions.png',txt:'Thomas aparece. "Você é do Códice?"',o:[{t:'Códice?',p:'s4c',thomas:20,n:'Thomas: O Jovem Esperança'},{t:'Otimista?',p:'s4d',thomas:15,n:'A Fé do Jovem Cientista'}],e:'Thomas'},'s3c':{t:'Cristais',i:'scene-archive.png',txt:'Cristais gigantes. Alguns apagando.',o:[{t:'Ajudar?',p:'s4e',ivo:35,n:'O Toque da PONTE'},{t:'Tempo?',p:'s4f',ivo:25,n:'O Tempo se Esgota Rapidamente'}],e:'A Câmara Moribunda'},'s3d':{t:'Perigo',i:'character_06_director_dilemma.png',txt:'"Diretor acha você risco."',o:[{t:'Esconder?',p:'s4g',ivo:20,n:'A Necessidade de Apoio'},{t:'Diretor?',p:'s4h',director:-5,n:'O Antagonista Revelado'}],e:'A Fação Dividida'},'s3e':{t:'Será',i:'character_02_sera_commanding.png',txt:'"Primeira bem-sucedida. Outros morreram."',o:[{t:'Outros?',p:'s4i',sera:25,n:'Os Primeiros Voluntários'},{t:'Salvar?',p:'s4j',sera:40,n:'A Fé de Será'}],e:'Será: Esperançosa'},'s3f':{t:'Armado',i:'character_02_sera_commanding.png',txt:'Será salta. Arma. "Não se mexa!"',o:[{t:'Calma',p:'s4k',sera:20,n:'Desescalação Estratégica'},{t:'Água',p:'s4l',sera:15,n:'Necessidade Humana'}],e:'Será: Guardiã'},'s3g':{t:'Recuperação',i:'character_02_sera_commanding.png',txt:'Câmara. Será compartilha histórias.',o:[{t:'Conhecer',p:'s4m',sera:35,n:'Vulnerabilidade Compartilhada'},{t:'Presença',p:'s4n',sera:30,n:'Presença Reconfortante'}],e:'Será: Luto'},'s3h':{t:'Teste',i:'character_02_sera_commanding.png',txt:'Você tenta. Cai. "Mente mais forte."',o:[{t:'Ivo',p:'s4o',sera:15,ivo:10,n:'Comunicação'},{t:'Perguntas',p:'s4p',sera:25,n:'Aprendizado'}],e:'Teste de Vontade'},'s4a':{t:'Unificação',i:'scene_01_restoration_engine_complete.png',txt:'Experimento universal. Falhou.',o:[{t:'Fim',p:'fim',ivo:20,n:'Entendimento'}],e:'Verdade'},'s4b':{t:'Paradoxo',i:'protag-turnaround.png',txt:'Você é paradoxo.',o:[{t:'Fim',p:'fim',ivo:10,n:'Paradoxo'}],e:'Confusão'},'s4c':{t:'Códice',i:'character_03_thomas_dimensions.png',txt:'Você é A PONTE.',o:[{t:'Fim',p:'fim',thomas:30,n:'Destino'}],e:'Destino'},'s4d':{t:'Otimismo',i:'character_03_thomas_dimensions.png',txt:'Thomas: "Há esperança."',o:[{t:'Fim',p:'fim',thomas:20,n:'Esperança'}],e:'Esperança'},'s4e':{t:'Toque',i:'scene-archive.png',txt:'Você pode sincronizar com cristais.',o:[{t:'Fim',p:'fim',ivo:40,n:'Sacrifício'}],e:'Sacrifício'},'s4f':{t:'Tempo',i:'scene-archive.png',txt:'Meses. Semanas talvez.',o:[{t:'Fim',p:'fim',ivo:20,n:'Urgência'}],e:'Urgência'},'s4g':{t:'Segurança',i:'character_01_ivo_archive.png',txt:'Ganhe apoio.',o:[{t:'Fim',p:'fim',ivo:25,n:'Diplomacia'}],e:'Diplomacia'},'s4h':{t:'Antagonista',i:'character_06_director_dilemma.png',txt:'Diretor é ameaça.',o:[{t:'Fim',p:'fim',director:-10,n:'Conflito'}],e:'Conflito'},'s4i':{t:'Primeiros',i:'character_02_sera_commanding.png',txt:'Você é diferente.',o:[{t:'Fim',p:'fim',sera:30,n:'Unicidade'}],e:'Unicidade'},'s4j':{t:'Fé',i:'character_02_sera_commanding.png',txt:'Será acredita em você.',o:[{t:'Fim',p:'fim',sera:40,n:'Aliança'}],e:'Aliança'},'s4k':{t:'Desescalação',i:'character_02_sera_commanding.png',txt:'Você se abaixa. Paz.',o:[{t:'Fim',p:'fim',sera:25,n:'Paz'}],e:'Compreensão'},'s4l':{t:'Humanidade',i:'character_02_sera_commanding.png',txt:'Você pede água.',o:[{t:'Fim',p:'fim',sera:20,n:'Humanidade'}],e:'Reconhecimento'},'s4m':{t:'Vulnerabilidade',i:'character_02_sera_commanding.png',txt:'Será: "Minha filha Mara, 8 anos."',o:[{t:'Fim',p:'fim',sera:35,n:'Luto'}],e:'Luto'},'s4n':{t:'Presença',i:'character_02_sera_commanding.png',txt:'Você pega na mão dela.',o:[{t:'Fim',p:'fim',sera:30,n:'Conexão'}],e:'Abraço'},'s4o':{t:'Comunicação',i:'character_01_ivo_archive.png',txt:'Será avisa Ivo.',o:[{t:'Fim',p:'fim',ivo:15,sera:15,n:'Comunicação'}],e:'Conversa'},'s4p':{t:'Aprendizado',i:'character_02_sera_commanding.png',txt:'Será conta histórias de NEXUS.',o:[{t:'Exploração',p:'s5a',sera:25,n:'Aprendizado'}],e:'Conhecimento'},'s5a':{t:'Exploração de NEXUS',i:'scene-deepsea.png',txt:'Você caminha pelos corredores antigos. Metal oxidado. Passarelas sobre abismos invisíveis. Laboratórios desertos. Tudo mantido pelos cristais, tudo dependente deles.',o:[{t:'Câmara da Guarda',p:'s5b',ivo:20,n:'Exploração de NEXUS'},{t:'Encontro Casual',p:'s5c',thomas:15,n:'Encontro'}],e:'Passeio'},'s5b':{t:'Câmara da Guarda',i:'scene-archive.png',txt:'Ivo mostra equipamentos antigos. "Aqui monitoramos barreiras dimensionais. Este painel registrou o colapso de TODAS as realidades simultaneamente."',o:[{t:'Compreensão',p:'s5d',ivo:25,n:'A Câmara da Guarda'},{t:'Superfície',p:'s6a',ivo:30,n:'Primeira Menção Superfície'}],e:'Revelação'},'s5c':{t:'Encontro com Monges',i:'character_07_monks_council.png',txt:'Os Monges sussurram. Seus olhos veem coisas que você não consegue. "A PONTE chega quando o fio se rompe," eles murmuram.',o:[{t:'Espiritualidade',p:'s5e',thomas:20,n:'Encontro com os Monges'},{t:'Dados',p:'s5f',thomas:15,n:'Próximo'}],e:'Misticismo'},'s5d':{t:'Histórico de Colapsos',i:'scene-archive.png',txt:'Os registros mostram: em 1950, em 2000, em 2080... pequenos colapsos. Todos reparados. Mas em 2150, todos os registros desaparecem simultaneamente. Como se a realidade tivesse... esquecido de si mesma.',o:[{t:'Monges',p:'s5c',ivo:20,n:'Padrão'},{t:'Superfície',p:'s6a',ivo:25,n:'Urgência'}],e:'Padrão'},'s5e':{t:'Câmara de Dados',i:'scene-archive.png',txt:'Thomas leva você a uma câmara com cristais menores. Tudo que NEXUS sabe está aqui. Quatro séculos de história, filosofia, ciência. E no centro: o Códice original em forma de dados dimensionais.',o:[{t:'Crise',p:'s6b',ivo:20,n:'A Câmara dos Dados'},{t:'Superfície',p:'s6a',ivo:25,n:'Preparação'}],e:'Conhecimento'},'s5f':{t:'Esperança',i:'character_03_thomas_dimensions.png',txt:'Thomas compartilha sua convicção profunda. "Você é aquele do Códice. Tenho certeza. E isto muda TUDO."',o:[{t:'Crise',p:'s6b',thomas:15,n:'Fé de Thomas'},{t:'Superfície',p:'s6a',thomas:20,n:'Próxima Etapa'}],e:'Fé'},'s6a':{t:'Preparação para Superfície',i:'scene-2150.png',txt:'Ivo procura você. "Precisamos entender o colapso. Tudo começou lá acima. Na superfície. Você consegue fazer a travessia dimensional?"',o:[{t:'Equipamento',p:'s6c',sera:20,n:'Equipamento Dimensional'},{t:'Crise Primeiro',p:'s6b',ivo:25,n:'Primeira Crise'}],e:'Preparação'},'s6b':{t:'Primeira Crise',i:'scene-archive.png',txt:'Os alarmes explodem. Um cristal principal está falhando rapidamente. Vibração no chão. Grito de alarme. Caos nos corredores. Você sente urgência como pressão no peito.',o:[{t:'Câmara',p:'s6d',ivo:35,n:'Primeira Crise'},{t:'Diretor',p:'s6e',director:-15,n:'Confrontação'}],e:'Crise'},'s6c':{t:'Equipamento Dimensional',i:'character_02_sera_commanding.png',txt:'Será oferece um dispositivo. "Isto sincroniza você entre realidades. Sem ele, você se desintegra durante a transição. Cuide-se."',o:[{t:'Despedida',p:'s6f',sera:25,n:'Equipamento Dimensional'},{t:'Crise',p:'s6b',ivo:20,n:'Crise'}],e:'Preparação Tecnológica'},'s6d':{t:'Câmara Moribunda',i:'scene-archive.png',txt:'O cristal está falhando em tempo real. Como assistir a um coração parando. Você sente a agonia em seus ossos, como se o cristal gritasse. Técnicos desesperam ao redor.',o:[{t:'Diretor Aparece',p:'s6e',director:-20,n:'Confrontação Final'},{t:'Solução',p:'s6g',ivo:30,n:'Tentativa Desesperada'}],e:'Morte'},'s6e':{t:'Confrontação com Diretor',i:'character_06_director_dilemma.png',txt:'O Diretor aparece. Uniforme impecável. Autoridade absoluta. "Ivo tem esperança. Eu tenho precaução. Um de nós está errado. Descobriremos quem."',o:[{t:'Será o Defende',p:'s6h',sera:25,n:'Defesa'},{t:'Crise Muda Tudo',p:'s6d',director:-30,n:'Crise'}],e:'Ameaça'},'s6f':{t:'Despedida de NEXUS',i:'scene-deepsea.png',txt:'Você olha para trás. NEXUS é seu lar agora. Será, Ivo, Thomas - todos aqui dependem de você encontrar respostas na superfície. Você respira fundo e se aproxima da barreira.',o:[{t:'Travessia',p:'s7a',ivo:30,n:'Despedida de NEXUS'}],e:'Partida'},'s6g':{t:'Tentativa Desesperada',i:'scene-archive.png',txt:'Ivo grita: "Talvez você possa sincronizar! Talvez sua consciência estabilize o cristal temporariamente!" Você coloca as mãos no cristal. Conexão. Luz. Dor. Seu corpo se contorce.',o:[{t:'Recuo',p:'s6f',sera:35,ivo:25,n:'Salvação'},{t:'Sacrifício',p:'fim_alt',ivo:50,n:'Sacrifício Precoce'}],e:'Teste'},'s6h':{t:'Será Defende Você',i:'character_02_sera_commanding.png',txt:'Será se coloca entre você e Diretor. "Com respeito, os dados mostram que ele está se estabilizando normalmente. Melhor que os anteriores. MUITO melhor."',o:[{t:'Thomas Apoia',p:'s6i',thomas:20,n:'Apoio Múltiplo'},{t:'Diretor Sai',p:'s6d',director:-25,n:'Crise Muda'}],e:'Defesa'},'s6i':{t:'Thomas Oferece Suporte',i:'character_03_thomas_dimensions.png',txt:'Thomas aparece com registros do Códice. "Os textos antigos descrevem ele com precisão assustadora. Não é coincidência. É profecia cumprida."',o:[{t:'Paz Temporária',p:'s6j',thomas:25,n:'Apoio Confirmado'},{t:'Crise',p:'s6d',ivo:25,n:'Interrupção'}],e:'Confirmação'},'s6j':{t:'Paz Frágil',i:'character_02_sera_commanding.png',txt:'Por um momento há trégua. Você sente o peso das alianças começando a se formar. Será toca seu ombro. "Você não está sozinho."',o:[{t:'Superfície',p:'s6a',sera:20,n:'Resolução'},{t:'Crise',p:'s6b',ivo:20,n:'Crise Chega'}],e:'Paz'},'s7a':{t:'Barreira Dimensional',i:'scene-2150.png',txt:'A transição começa. Seu corpo formiga. Sentidos turbulentos. Você atravessa uma cortina invisível. De repente você está em outro lugar. A superfície. O mundo acima. NEXUS ficou para trás.',o:[{t:'Despertar',p:'sup_1',reva:0,n:'Superfície Revelada'}],init:0,e:'Travessia'},'sup_1':{t:'O Mundo Acima',i:'scene-deepsea.png',txt:'Prédios destruídos. Céu roxo com auroras estranhas. Vento assustador. Você respira ar que nunca havia respirado. É similar ao de NEXUS, mas não. É o ar de um mundo agonizante.',o:[{t:'Explorar',p:'sup_2',n:'Exploração Urbana'},{t:'Procurar Vida',p:'sup_3',n:'Busca'}],e:'Mundo Acima'},'sup_2':{t:'Ruína Urbana',i:'character_06_director_dilemma.png',txt:'Prédios de vidro e aço reduzidos a esqueletos. Ruas vazias. Nenhuma pessoa. Apenas vento ecoando. É como se a civilização tivesse simplesmente... cessado.',o:[{t:'Procurar Vida',p:'sup_3',n:'Exploração'},{t:'Voltar',p:'s7a',ivo:10,n:'Volta a NEXUS'}],e:'Exploração'},'sup_3':{t:'Encontro com Sobreviventes',i:'character_04_reva_reunion.png',txt:'Você escuta vozes. Acampamento. Tendas feitas de entulho. Pessoas magras, cicatrizes, mas VIVAS. E acima delas: Reva. Cicatriz no rosto. Olhos duros testados pelo tempo.',o:[{t:'Abordagem Cauta',p:'sup_4',reva:10,n:'Reva - Primeira'},{t:'Grito de Ajuda',p:'sup_5',reva:-10,n:'Confrontação'}],e:'Encontro Humano'},'sup_4':{t:'Reva - A Líder',i:'character_04_reva_reunion.png',txt:'"Você vem de cima? De NEXUS?" Reva observa desconfiada. "Porque NEXUS nunca se importou com a gente. Nos abandonaram aqui para morrer."',o:[{t:'Verdade',p:'sup_6',reva:20,n:'Verdade da Superfície'},{t:'Diplomacia',p:'sup_7',reva:25,n:'Negociação'}],e:'Reva Conhecida'},'sup_5':{t:'Confrontação Agressiva',i:'character_04_reva_reunion.png',txt:'As pessoas o cercam. Armas improvisadas. Reva avança. "Você é um espiã? Biologicamente alterado? NEXUS nos atacou?"',o:[{t:'Explicação',p:'sup_6',reva:5,n:'Explicação'},{t:'Defesa',p:'sup_8',reva:-25,n:'Conflito Armado'}],e:'Confrontação Violenta'},'sup_6':{t:'Verdade Compartilhada',i:'character_04_reva_reunion.png',txt:'Você conta tudo. NEXUS. Os cristais. O Colapso em TODAS as dimensões. Você sendo A PONTE. Reva escuta, seus olhos mudando. De desconfiança para... compreensão.',o:[{t:'Aliança',p:'sup_9',reva:30,n:'Superfície e NEXUS'},{t:'Dúvida',p:'sup_7',reva:10,n:'Dúvida Persistente'}],e:'Revelação'},'sup_7':{t:'Negociação Difícil',i:'character_04_reva_reunion.png',txt:'"Por que deveria acreditar? NEXUS não ajudou quando poderia." Sua raiva é legítima. "Por que agora?"',o:[{t:'Promessa',p:'sup_9',reva:25,n:'Compromisso'},{t:'Volta',p:'s7a',ivo:15,n:'Retorno'}],e:'Desconfiança'},'sup_8':{t:'Conflito Aberto',i:'character_04_reva_reunion.png',txt:'Você tenta se defender. Mas está exausto. Sobreviventes são muitos. Você cai. Reva coloca uma faca em seu pescoço. Está tudo escuro.',o:[{t:'Rendição',p:'sup_10',reva:-40,n:'Captura'},{t:'Última Palavra',p:'sup_6',reva:10,n:'Apelo'}],e:'Derrota'},'sup_9':{t:'Aliança Formada',i:'character_04_reva_reunion.png',txt:'Reva oferece sua mão. "Se NEXUS está morrendo, temos inimigo comum: o tempo. Ajudarei você. E você ajudará a gente quando voltar."',o:[{t:'Busca de Respostas',p:'sup_11',reva:35,n:'Aliança com Reva'},{t:'História de Reva',p:'sup_12',reva:30,n:'Reva: Passado'}],e:'Aliança Formada'},'sup_10':{t:'Capturado',i:'character_04_reva_reunion.png',txt:'Preso. Amarrado. Interrogado. Reva é brutal mas não cruel. "Você vai levar a gente de volta para NEXUS. Ou seus amigos morrem."',o:[{t:'Acordo',p:'sup_11',reva:-15,n:'Acordo Forçado'},{t:'Escape',p:'sup_13',reva:-40,n:'Fuga'}],e:'Captura'},'sup_11':{t:'Busca Conjunta',i:'scene-deepsea.png',txt:'Você e Reva exploram a Superfície. Procuram respostas. Onde começou o Colapso? Qual foi o gatilho? Há sinais de laboratório, de experimento avançado.',o:[{t:'Descoberta',p:'sup_14',reva:25,n:'Descoberta Científica'},{t:'Base Antiga',p:'sup_15',reva:20,n:'Base Científica'}],e:'Busca Compartilhada'},'sup_12':{t:'Reva: Passado',i:'character_04_reva_reunion.png',txt:'"Meu nome é Reva Ortiz. Engenheira de sistemas em São Paulo. O Colapso começou sem aviso. Um instante tudo funcionava. O próximo, o espaço rasgava. Pessoas desapareciam. Eu corri. Escapei. Encontrei outros. E assim começou."',o:[{t:'Solidariedade',p:'sup_9',reva:35,n:'Empatia'},{t:'Busca',p:'sup_11',reva:25,n:'Determinação'}],e:'Reva Revelada'},'sup_13':{t:'Fuga Dramática',i:'scene-2150.png',txt:'Você se solta. Corre pelas ruas desertas. Edifícios ruinosos. Reva te persegue, gritos ecoando. Você alcança a barreira dimensional. Por pouco.',o:[{t:'Volta',p:'s7a',reva:-50,ivo:40,n:'Fuga para NEXUS'},{t:'Último Apelo',p:'sup_9',reva:-20,n:'Reconciliação'}],e:'Fuga'},'sup_14':{t:'Descoberta Científica',i:'scene_01_restoration_engine_complete.png',txt:'Registros. Documentos queimados mas legíveis. UNIFICAÇÃO. O projeto que tentava unificar TODAS as dimensões. O epicentro foi aqui. Nesta cidade. Neste laboratório.',o:[{t:'Verdade',p:'sup_16',reva:30,n:'Verdade Encontrada'},{t:'Responsável',p:'sup_17',reva:25,n:'Culpa'}],e:'Verdade Revelada'},'sup_15':{t:'Base Científica Subterrânea',i:'character_06_director_dilemma.png',txt:'Estrutura de vidro e aço. Equipamento avançado ainda funcionando. Um computador ligado. Telas mostrando: UNIFICAÇÃO - ERRO CRÍTICO - COLAPSO UNIVERSAL.',o:[{t:'Acessar',p:'sup_18',reva:25,n:'Sistema Científico'},{t:'Reva',p:'sup_11',reva:20,n:'Reva Espera'}],e:'Base Descoberta'},'sup_16':{t:'Verdade do Colapso',i:'scene_01_restoration_engine_complete.png',txt:'Os documentos revelam: cientistas de múltiplas dimensões convidados para projeto final. Unificar TUDO. Remover paradoxo. Remover liberdade de escolha. E sim... alguém com seu nome/número estava lá. SUA consciência estava lá. VOCÊ foi parte disto.',o:[{t:'Culpa',p:'sup_19',reva:15,n:'Culpa Revelada'},{t:'Inocência',p:'sup_20',reva:25,n:'Inocência'}],e:'Verdade Completa'},'sup_17':{t:'Responsabilidade Pessoal',i:'character_06_director_dilemma.png',txt:'Os nomes estão visíveis. E um deles é VOCÊ. Ou uma versão de você. Reva te olha diferente agora. "Você CAUSOU isto? Você matou BILHÕES?"',o:[{t:'Explicação',p:'sup_20',reva:10,n:'Explicação Paradoxal'},{t:'Admissão',p:'sup_21',reva:-25,n:'Admissão'}],e:'Culpa Pessoal'},'sup_18':{t:'Sistema Ativo',i:'scene_01_restoration_engine_complete.png',txt:'O computador mostra tudo. Transferências de consciência. Sincronizações multidimensionais. E um nome: "PONTE - SINCRONIZAÇÃO UNIVERSAL - COMANDO FINAL". O comando nunca foi executado. VOCÊ é aquele comando. VOCÊ é a chave.',o:[{t:'Verdade',p:'sup_16',reva:35,n:'Sistema Reveals'},{t:'Destino',p:'sup_22',reva:30,n:'Destino'}],e:'Revelação Técnica'},'sup_19':{t:'Culpa Pessoal Absoluta',i:'character_06_director_dilemma.png',txt:'Você carrega agora o peso de BILHÕES de mortes. Sua outra versão estava envolvida. Você não sabe se fez isto voluntariamente. Você não sabe se é assassino ou vítima.',o:[{t:'Aceitar',p:'s7a',reva:20,ivo:25,n:'Retorno Determinado'},{t:'Rejeitar',p:'sup_23',reva:-40,n:'Rejeição'}],e:'Culpa Absoluta'},'sup_20':{t:'Paradoxo Explicado',i:'protag-turnaround.png',txt:'"Eu existia em múltiplas dimensões. Uma versão estava no Unificação. Mas eu não sou aquela versão. Sou um ponto de convergência. A PONTE ENTRE as versões."',o:[{t:'Compreensão',p:'sup_9',reva:25,n:'Entendimento'},{t:'Dúvida',p:'sup_21',reva:10,n:'Dúvida'}],e:'Paradoxo'},'sup_21':{t:'Culpa Compartilhada',i:'character_04_reva_reunion.png',txt:'Reva senta. "Se você é parte daquilo... então você precisa arrumar isto. Não para NEXUS. Para bilhões. Para as pessoas que morreram porque alguém COMO você teve uma ideia terrível."',o:[{t:'Compromisso',p:'s7a',reva:20,ivo:35,n:'Volta Determinada'},{t:'Cansaço',p:'sup_23',reva:-15,n:'Abandono'}],e:'Confissão'},'sup_22':{t:'Destino Revelado',i:'scene_01_restoration_engine_complete.png',txt:'Você é a chave final. O comando nunca executado. Se ativar o protocolo completo, você PODE reconstruir as barreiras dimensionais. PODE salvar NEXUS. Mas o preço: sua consciência será dividida permanentemente entre realidades.',o:[{t:'Sacrifício',p:'fim_sacrificio',reva:50,ivo:50,n:'Sacrifício Final'},{t:'Volta',p:'s7a',reva:25,ivo:25,n:'Buscar Alternativa'}],e:'Destino'},'sup_23':{t:'Abandono Total',i:'scene-deepsea.png',txt:'Você tira a máquina de sincronização e a joga fora. Reva e você se separam. Você fica na Superfície, observando o Colapso em câmera lenta. Você falhou.',o:[{t:'Fim',p:'fim_triste',reva:-60,ivo:-60,n:'Derrota Total'}],e:'Abandono'},'fim_sacrificio':{t:'A PONTE Permanente',i:'scene-2150.png',txt:'Você ativa o protocolo. Sua consciência se estende através de TODAS as realidades simultaneamente. Agonia. Êxtase. Bilhões de vidas se salvam. NEXUS brilha. Superfície reconstruir. Mas você não é mais um ser único. Você É A PONTE - fragmentada, espalhada, conectando tudo eternamente.',o:[{t:'FIM - SACRIFÍCIO',p:'',n:'Sacrifício da PONTE'}],e:'Sacrifício da PONTE'},'fim_triste':{t:'Colapso Completo',i:'character_06_director_dilemma.png',txt:'NEXUS desaparece. Superfície entra em caos total. Você observa enquanto civilização após civilização desmorona. Você era A PONTE. Você poderia ter salvado tudo. Você falhou.',o:[{t:'Jogar Novamente',p:'inicio',n:'Derrota Final'}],e:'Derrota Total'},'fim_alt':{t:'Sacrifício Precoce',i:'scene-archive.png',txt:'Você oferece completamente ao cristal. Consciência o estabiliza, mas ao custo de sua existência. Você morre na Câmara. Será chora. Ivo murmura: "Você foi A PONTE. Você nos salvou."',o:[{t:'Jogar Novamente',p:'inicio'}],e:'Sacrifício Precoce'}};let st={s:'inicio',r:{ivo:0,sera:0,thomas:0,reva:0,director:0,monks:0},e:[],n:[],c:0,t:0};function playSound(tipo){try{const sounds={'click':'file:///C:/Users/54547130159/nexus/game-engine/public/audio/sfx/click.mp3','transition':'file:///C:/Users/54547130159/nexus/game-engine/public/audio/sfx/transition.mp3','echo':'file:///C:/Users/54547130159/nexus/game-engine/public/audio/sfx/fourth-line.mp3'};new Audio(sounds[tipo]).play().catch(()=>{});}catch(e){}}function render(id){if(!CENAS[id])id='inicio';const cena=CENAS[id];if(cena.init){st.r={ivo:0,sera:0,thomas:0,reva:0,director:0,monks:0};st.e=[];st.n=[];st.c=0;}document.getElementById('title').textContent=cena.t;document.getElementById('img').src='file:///C:/Users/54547130159/nexus/game-engine/public/images/'+cena.i;document.getElementById('text').textContent=cena.txt;let html='';cena.o.forEach(o=>html+='<button onclick="ir(\''+o.p+'\')">'+o.t+'</button>');document.getElementById('btns').innerHTML=html;cena.o.forEach(o=>{if(o.ivo)st.r.ivo+=o.ivo;if(o.sera)st.r.sera+=o.sera;if(o.thomas)st.r.thomas+=o.thomas;if(o.director)st.r.director+=o.director;if(o.n&&!st.n.find(x=>x.t===o.n))st.n.push({t:o.n,d:DESC[o.n]||'Entrada'});});if(cena.e&&!st.e.includes(cena.e))st.e.push(cena.e);st.c++;let rHtml='';for(const[nm,v]of Object.entries(st.r)){let cor=v<-50?'#ff3333':v<0?'#ff9800':v<50?'#2196F3':'#4CAF50';rHtml+='<div class="item" onclick="openRels()" style="color:'+cor+';">'+nm+': '+(v>0?'+':'')+v+'</div>';}document.getElementById('rels').innerHTML=rHtml;let nHtml=st.n.map((x,i)=>'<div class="item" onclick="openNote('+i+')">📝 '+x.t+'</div>').join('');document.getElementById('note').innerHTML=nHtml||'<div style="color:#999;">Nenhuma entrada</div>';let eHtml=st.e.map((x,i)=>'<div class="item" onclick="openEcho('+i+')">🔷 '+x+'</div>').join('');document.getElementById('echo').innerHTML=eHtml||'<div style="color:#999;">Nenhum eco</div>';document.getElementById('ecount').textContent=st.e.length;document.getElementById('count').textContent=st.c;}function ir(id){playSound('transition');st.s=id;render(id);}function openRels(){playSound('click');let html='';for(const[nm,v]of Object.entries(st.r)){let cor=v<-50?'#ff3333':v<0?'#ff9800':v<50?'#2196F3':'#4CAF50';html+='<div class="box" style="border-left-color:'+cor+'"><h4 style="color:'+cor+'">'+nm.toUpperCase()+'</h4><p style="color:'+cor+'">Relacionamento: '+(v>0?'+':'')+v+'/100</p></div>';}document.getElementById('relExp').innerHTML=html;document.getElementById('relModal').classList.add('show');}function closeRels(){document.getElementById('relModal').classList.remove('show');}function openNote(i){playSound('click');const item=st.n[i];document.getElementById('noteExp').innerHTML='<div class="box"><h4>📝 '+item.t+'</h4><p>'+item.d+'</p></div>';document.getElementById('noteModal').classList.add('show');}function closeNote(){document.getElementById('noteModal').classList.remove('show');}function openEcho(i){playSound('echo');const item=st.e[i];document.getElementById('echoExp').innerHTML='<div class="box"><h4>🔷 '+item+'</h4><p>Eco profundo que marca sua jornada em NEXUS. Este momento ressoará através de todas as suas realidades alternativas.</p></div>';document.getElementById('echoModal').classList.add('show');}function closeEcho(){document.getElementById('echoModal').classList.remove('show');}setInterval(()=>{st.t++;let m=Math.floor(st.t/60);let s=(st.t%60).toString().padStart(2,'0');document.getElementById('time').textContent=m+':'+s;},1000);render('inicio');</script></body></html>
