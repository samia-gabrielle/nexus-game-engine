<!DOCTYPE html>
<html>
<head>
  <title>NEXUS Test</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #00d4ff; padding: 20px; }
    .log { margin: 10px 0; padding: 10px; background: #0a0a15; border-left: 3px solid #00d4ff; }
    .ok { color: #00ff88; }
    .error { color: #ff3333; }
  </style>
</head>
<body>
  <h1>NEXUS Server Test</h1>
  <div id="output"></div>

  <script>
    const output = document.getElementById('output');

    async function test() {
      addLog('🔍 Testing API...');

      try {
        addLog('Calling /api/game/new...');
        const res = await fetch('http://localhost:3000/api/game/new', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });

        const data = await res.json();
        if (data.success) {
          addLog('✅ Server responded successfully!', 'ok');
          addLog('Game state received: ' + JSON.stringify(data.state).substring(0, 100) + '...', 'ok');
        } else {
          addLog('❌ Server error: ' + data.error, 'error');
        }
      } catch (error) {
        addLog('❌ Fetch failed: ' + error.message, 'error');
      }
    }

    function addLog(msg, type = 'normal') {
      const div = document.createElement('div');
      div.className = 'log ' + type;
      div.textContent = msg;
      output.appendChild(div);
    }

    // Run test on load
    window.addEventListener('load', test);
  </script>
</body>
</html>
